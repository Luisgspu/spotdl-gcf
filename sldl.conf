# slsk-batchdl config — quality preferences for DJ library downloads
# Credentials (--user / --pass / --spotify-id / --spotify-secret) are
# passed by slsk-download.ps1 from .env so this file is safe to commit.

# ── Output ─────────────────────────────────────────────────────────────────────
path = C:\Users\Acer\spotdl-gcf\downloads
# "Artist - Title.flac/.mp3" — Rekordbox-compatible flat layout.
# Falls back to the original Soulseek filename if tags are missing.
name-format = {artist( - )title|filename}

# ── Priority 1: lossless FLAC (any bitrate/samplerate — includes Hi-Res) ───────
pref-format = flac,wav
pref-length-tol = 9999
pref-max-bitrate = 9999
pref-max-samplerate = 192000

# ── Fallback: MP3 at 320 kbps minimum ─────────────────────────────────────────
format = flac,wav,mp3
min-bitrate = 320
length-tol = 6

# ── Search behaviour ───────────────────────────────────────────────────────────
fast-search = false
strict-title = true
concurrent-downloads = 3
fails-to-downrank = 1
fails-to-ignore = 3
